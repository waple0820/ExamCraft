name: Claude Assistant

# Mirrors the workflow used in the upstream browseruse-bench repo. Triggers
# Claude on @claude mentions in comments / reviews / issues, and on every
# PR open or push (so reviews happen automatically).
#
# Requires two repo secrets:
#   ANTHROPIC_API_KEY   key for the LiteLLM gateway
#   ANTHROPIC_BASE_URL  e.g. https://litellm.local.lexmount.net (no trailing /v1)
#
# Note: runs on a self-hosted runner because the LiteLLM gateway is on the
# internal network. If you swap to a different runner, update the executable
# paths below to match (or drop them so the action installs on demand).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize'))
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path_to_claude_code_executable: /home/github/.local/bin/claude
          path_to_bun_executable: /home/github/.bun/bin/bun

          # Allow Claude to read CI results on PRs.
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
